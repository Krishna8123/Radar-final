name: Radar CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: radar-main-backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Backend Dependencies
        run: npm install

      - name: Create Backend .env
        run: |
          echo "MONGO_URI=${{ secrets.MONGO_URI }}" >> .env
          echo "TWELVE_API_KEY=${{ secrets.TWELVE_API_KEY }}" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env

      
      - name: Backend Check
        run: echo "Backend setup successful"


  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: RadarFrontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Frontend Dependencies
        run: npm install

      - name: Build Frontend
        run: npm run build